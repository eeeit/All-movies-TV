name: moontv

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: moontv:ecs
    container_name: moontv-app
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - '127.0.0.1:${APP_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      USERNAME: ${USERNAME}
      PASSWORD: ${PASSWORD}
      NEXT_PUBLIC_STORAGE_TYPE: ${NEXT_PUBLIC_STORAGE_TYPE:-redis}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      NEXT_PUBLIC_ENABLE_REGISTER: ${NEXT_PUBLIC_ENABLE_REGISTER:-false}
      NEXT_PUBLIC_SEARCH_MAX_PAGE: ${NEXT_PUBLIC_SEARCH_MAX_PAGE:-5}
      NEXT_PUBLIC_IMAGE_PROXY: ${NEXT_PUBLIC_IMAGE_PROXY:-}
      SITE_NAME: ${SITE_NAME:-}
      ANNOUNCEMENT: ${ANNOUNCEMENT:-}
    volumes:
      - ./config.json:/app/config.json:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://127.0.0.1:3000/login >/dev/null 2>&1 || exit 1',
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: moontv-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
